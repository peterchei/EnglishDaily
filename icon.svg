<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient matching the app's dark theme -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <!-- Blue glow for the E -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square in app dark navy -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- ── Open book ─────────────────────────────────── -->

  <!-- Left page (slightly angled outward) -->
  <path d="M 96,148 C 120,142 248,136 252,138 L 252,374 C 248,376 108,384 96,378 Z"
        fill="#1e293b" stroke="#334155" stroke-width="3"/>

  <!-- Right page -->
  <path d="M 416,148 C 392,142 264,136 260,138 L 260,374 C 264,376 404,384 416,378 Z"
        fill="#1e293b" stroke="#334155" stroke-width="3"/>

  <!-- Book spine (amber — stands out as the "daily" stripe) -->
  <rect x="248" y="135" width="16" height="244" rx="4" fill="#f59e0b"/>

  <!-- ── Left page: vocabulary lines ─────────────────── -->
  <line x1="122" y1="196" x2="234" y2="192" stroke="#3b82f6" stroke-width="8"  stroke-linecap="round" opacity="0.85"/>
  <line x1="122" y1="228" x2="234" y2="224" stroke="#3b82f6" stroke-width="8"  stroke-linecap="round" opacity="0.60"/>
  <line x1="122" y1="260" x2="194" y2="257" stroke="#3b82f6" stroke-width="8"  stroke-linecap="round" opacity="0.35"/>

  <!-- Small "cantonese" dot accent (bilingual symbol) -->
  <circle cx="122" cy="300" r="7" fill="#f59e0b" opacity="0.7"/>
  <line x1="140" y1="300" x2="194" y2="298" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- ── Right page: bold E ──────────────────────────── -->
  <text x="346" y="322"
        font-family="'Arial Black', 'Arial', sans-serif"
        font-size="168"
        font-weight="900"
        fill="#3b82f6"
        text-anchor="middle"
        filter="url(#glow)">E</text>

  <!-- ── Audio waveform (pronunciation) ─────────────── -->
  <!-- Bars centered at y=438, varying heights to suggest a waveform -->
  <g fill="#10b981" opacity="0.92">
    <rect x="136" y="428" width="16" height="20"  rx="4"/>
    <rect x="162" y="416" width="16" height="44"  rx="4"/>
    <rect x="188" y="424" width="16" height="28"  rx="4"/>
    <rect x="214" y="410" width="16" height="56"  rx="4"/>
    <rect x="240" y="422" width="16" height="32"  rx="4"/>
    <rect x="266" y="418" width="16" height="40"  rx="4"/>
    <rect x="292" y="426" width="16" height="24"  rx="4"/>
    <rect x="318" y="413" width="16" height="50"  rx="4"/>
    <rect x="344" y="424" width="16" height="28"  rx="4"/>
    <rect x="370" y="430" width="16" height="16"  rx="4"/>
  </g>
</svg>
